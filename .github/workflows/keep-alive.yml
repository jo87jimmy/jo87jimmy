name: Keep Render Alive

on:
  schedule:
    # 每 14 分鐘觸發一次
    - cron: "*/14 * * * *"
  workflow_dispatch: # 允許手動測試

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Hit Health Check
        run: |
          # -s: 靜音模式
          # -f: 如果 HTTP 狀態碼 >= 400 則回傳失敗 (Fail)
          # -o /dev/null: 捨棄回應本文，不佔用日誌空間
          curl -sf -o /dev/null https://togetherwordsprod.onrender.com/health
          echo "Ping success at $(date)"
