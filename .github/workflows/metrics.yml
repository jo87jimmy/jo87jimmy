name: Metrics

on:
  schedule: [{ cron: "0 */6 * * *" }]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: jo87jimmy
          template: classic
          base: header, community, repositories, metadata

          config_timezone: Asia/Taipei
          theme: github
          config_display: large
          config_padding: 0, 8 + 11%

          # languages
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7
          plugin_languages_recent_categories: yes
          plugin_languages_recent_days: 14
          plugin_languages_indepth: yes
          plugin_lines_history_limit: 1

          # lines
          plugin_lines: yes
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base

          # calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # topics
          plugin_topics: yes
          plugin_topics_limit: 12
          plugin_topics_mode: icons

          # metadata
          plugin_metadata: yes
          plugin_metadata_display: stars, forks, watchers

          # disable unstable
          plugin_activity: no
          plugin_habits: no
          plugin_habits_facts: no
          plugin_pagespeed: no
          plugin_repositories: no
          plugin_repositories_featured: no

          filename: github-metrics.svg
